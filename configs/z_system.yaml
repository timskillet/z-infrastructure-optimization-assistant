zosmf:
  host: ${ZOSMF_HOST}
  port: 6443
  username: ${ZOSMF_USER}
  password: ${ZOSMF_PASS}
  verify_ssl: false

db2:
  host: ${DB2_HOST}
  port: 6443
  username: ${DB2_USER}
  password: ${DB2_PASS}
  database: ${DB2_DATABASE}

rag:
  docs_path: ./data/z_documentation
  embedding_model: text-embedding-3-small
  vector_db: ./data/chromadb

llm:
  provider: anthropic
  model: claude-3-5-sonnet-20241022